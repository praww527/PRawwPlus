name: CI / Deploy

on:
  push:
    branches: [master, main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Verify ────────────────────────────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build shared libraries
        run: |
          pnpm --filter @workspace/db run build
          pnpm --filter @workspace/api-zod run build
          pnpm --filter @workspace/auth-web run build
          pnpm --filter @workspace/api-client-react run build

      - name: API server — typecheck
        run: pnpm --filter @workspace/api-server run typecheck

      - name: API server — lint
        run: pnpm --filter @workspace/api-server run lint

      - name: API server — build
        run: pnpm --filter @workspace/api-server run build

      - name: Web app — build
        run: pnpm --filter @workspace/prawwplus run build

  # ─── 2. Deploy to Oracle VPS (158.180.29.84) ──────────────────────────────
  #
  # Required GitHub Secrets (Settings → Secrets and variables → Actions):
  #   VPS_HOST       — 158.180.29.84
  #   VPS_USER       — ubuntu
  #   VPS_SSH_KEY    — OpenSSH private key (full content, NO passphrase)
  #                    Must start with:  -----BEGIN OPENSSH PRIVATE KEY-----
  #                    Must end with:    -----END OPENSSH PRIVATE KEY-----
  #   VPS_PORT       — 22
  #   VPS_DEPLOY_DIR — /home/ubuntu/PRawwPlus
  #
  # Optional:
  #   VPS_HEALTH_URL — https://rtc.praww.co.za/api/healthz
  deploy:
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment secrets
        id: secrets_check
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          KEY="${{ secrets.VPS_SSH_KEY }}"
          if [[ -z "$HOST" || -z "$KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  VPS_HOST or VPS_SSH_KEY not set — skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✓ Deployment secrets found"
          fi

      - name: Write SSH key + deploy
        if: steps.secrets_check.outputs.configured == 'true'
        env:
          VPS_SSH_KEY_RAW: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # ── Write SSH private key robustly ───────────────────────────────
          # Python handles: literal \n escapes, CRLF, missing trailing newline,
          # extra blank lines, BOM, and other encoding artifacts.
          python3 - <<'PYEOF'
          import os, sys, re

          raw = os.environ.get('VPS_SSH_KEY_RAW', '')

          # If stored as single line with literal \n escapes (common mistake)
          if '\n' not in raw and '\\n' in raw:
              raw = raw.replace('\\n', '\n')

          # Strip Windows CRLF
          raw = raw.replace('\r\n', '\n').replace('\r', '\n')

          # Extract only the key block (handles extra surrounding whitespace/text)
          match = re.search(
              r'(-----BEGIN [A-Z ]+ PRIVATE KEY-----.*?-----END [A-Z ]+ PRIVATE KEY-----)',
              raw, re.DOTALL
          )
          if match:
              key = match.group(1).strip() + '\n'
          else:
              key = raw.strip() + '\n'

          key_path = os.path.expanduser('~/.ssh/deploy_key')
          with open(key_path, 'w') as f:
              f.write(key)

          print(f'Key written: {len(key)} bytes, {key.count(chr(10))} lines')
          print(f'First line: {key.splitlines()[0]}')
          print(f'Last line:  {key.splitlines()[-1]}')
          PYEOF

          chmod 600 ~/.ssh/deploy_key

          # ── Validate key can be parsed ────────────────────────────────────
          echo "── ssh-keygen fingerprint ────────────────────────────────"
          if ssh-keygen -l -f ~/.ssh/deploy_key 2>&1; then
            echo "✓ Key fingerprint OK"
          else
            echo "⚠️  ssh-keygen -l failed (key may have passphrase or unusual format)"
            echo "   File size: $(wc -c < ~/.ssh/deploy_key) bytes, $(wc -l < ~/.ssh/deploy_key) lines"
            echo "   First bytes (hex): $(head -c 64 ~/.ssh/deploy_key | xxd | head -4)"
          fi

          # ── Configure SSH client ──────────────────────────────────────────
          PORT="${VPS_PORT:-22}"
          HOST="$VPS_HOST"
          USER="${VPS_USER:-ubuntu}"

          cat > ~/.ssh/config <<EOF
          Host deploy_target
            HostName $HOST
            User $USER
            Port $PORT
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ServerAliveInterval 30
            ServerAliveCountMax 6
            ConnectTimeout 15
          EOF
          chmod 600 ~/.ssh/config

          # ── Test SSH connectivity ─────────────────────────────────────────
          echo "── Testing SSH to ${HOST}:${PORT} as ${USER} ──────────────"
          ssh -vvv deploy_target 'echo "✓ SSH OK — $(uname -n) — $(date)"' 2>&1 \
            | grep -E "^(debug1: |Warning|Authenticated|Permission|Connection|✓)" \
            | head -40 \
            || {
              echo "SSH FAILED — raw verbose output:"
              ssh -vvv deploy_target 'true' 2>&1 | tail -30
              exit 1
            }

          # ── Remote deployment script ──────────────────────────────────────
          DEPLOY_DIR="${VPS_DEPLOY_DIR:-/home/ubuntu/PRawwPlus}"
          DEPLOY_DIR="${DEPLOY_DIR%/}"
          echo "── Deploying to $HOST:$DEPLOY_DIR ──────────────────────────"

          ssh deploy_target bash -s <<REMOTE
          set -euo pipefail
          DEPLOY_DIR="${DEPLOY_DIR}"
          echo "==> [1/8] Pull latest code"
          git -C "\$DEPLOY_DIR" fetch origin
          git -C "\$DEPLOY_DIR" reset --hard "origin/\$(git -C "\$DEPLOY_DIR" rev-parse --abbrev-ref HEAD)"
          echo "  HEAD: \$(git -C "\$DEPLOY_DIR" log --oneline -1)"

          echo "==> [2/8] Fix file ownership"
          sudo chown -R ubuntu:ubuntu "\$DEPLOY_DIR" 2>/dev/null || true

          echo "==> [3/8] Enable pnpm"
          corepack enable 2>/dev/null || sudo npm install -g pnpm@10.26.1 --loglevel=error
          corepack prepare pnpm@10.26.1 --activate 2>/dev/null || true
          echo "  pnpm: \$(pnpm --version)"

          echo "==> [4/8] Install dependencies"
          cd "\$DEPLOY_DIR"
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

          echo "==> [5/8] Build shared libraries"
          pnpm --filter @workspace/db \
               --filter @workspace/api-zod \
               --filter @workspace/auth-web \
               --filter @workspace/api-client-react \
               run build

          echo "==> [6/8] Build web + API"
          pnpm --filter @workspace/prawwplus run build
          pnpm --filter @workspace/api-server run build

          echo "==> [7/8] Restart systemd service"
          sudo cp "\$DEPLOY_DIR/deploy/prawwplus-api.service" /etc/systemd/system/prawwplus-api.service
          sudo systemctl daemon-reload
          sudo systemctl enable prawwplus-api
          sudo systemctl restart prawwplus-api
          echo "  Waiting for service to become active..."
          for i in \$(seq 1 24); do
            sleep 5
            if systemctl is-active --quiet prawwplus-api; then
              echo "  ✓ Service active after \$((i*5))s"
              break
            fi
            if [ "\$i" -eq 24 ]; then
              echo "  ✗ Service failed after 120s"
              journalctl -u prawwplus-api -n 80 --no-pager
              exit 1
            fi
            echo "  ... \$((i*5))s"
          done

          echo "==> [8/8] Cleanup stale processes"
          pgrep -f "tsx.*index" | grep -v "^\$\$" | xargs kill -SIGTERM 2>/dev/null || true
          for ZOMBIE_PPID in \$(ps -eo ppid,stat | awk '\$2~/^Z/{print \$1}' | sort -u); do
            [ "\$ZOMBIE_PPID" -le 1 ] && continue
            kill -SIGCHLD "\$ZOMBIE_PPID" 2>/dev/null || true
          done

          echo "==> Deploy complete: \$(date)"
          echo "    \$(git -C "\$DEPLOY_DIR" log --oneline -1)"
          systemctl status prawwplus-api --no-pager --lines=5
          REMOTE

      - name: HTTP health check
        if: steps.secrets_check.outputs.configured == 'true'
        env:
          HEALTH_URL: ${{ secrets.VPS_HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "VPS_HEALTH_URL not set — skipping HTTP health check"
            exit 0
          fi
          echo "Checking $HEALTH_URL"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✓ Health check passed"
              exit 0
            fi
            [ "$i" -lt 6 ] && sleep 15
          done
          echo "✗ Health check failed after 6 attempts"
          exit 1
