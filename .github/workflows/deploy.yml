name: CI / Deploy

on:
  push:
    branches: [master, main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Verify ────────────────────────────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build shared libraries
        run: |
          pnpm --filter @workspace/db run build
          pnpm --filter @workspace/api-zod run build
          pnpm --filter @workspace/auth-web run build
          pnpm --filter @workspace/api-client-react run build

      - name: API server — typecheck
        run: pnpm --filter @workspace/api-server run typecheck

      - name: API server — lint
        run: pnpm --filter @workspace/api-server run lint

      - name: API server — build
        run: pnpm --filter @workspace/api-server run build

      - name: Web app — build
        run: pnpm --filter @workspace/prawwplus run build

  # ─── 2. Deploy to Oracle VPS (158.180.29.84) ──────────────────────────────
  #
  # Required GitHub Secrets (Settings → Secrets and variables → Actions):
  #   VPS_HOST       — 158.180.29.84
  #   VPS_USER       — ubuntu
  #   VPS_SSH_KEY    — OpenSSH private key for VPS access (NO passphrase)
  #   VPS_PORT       — 22  (optional, defaults to 22)
  #   VPS_DEPLOY_DIR — /home/ubuntu/PRawwPlus  (optional)
  #
  # Application secrets (written to VPS .env on every deploy):
  #   MONGODB_URI                — MongoDB connection string
  #   SESSION_SECRET             — cookie signing secret (≥32 chars)
  #   ADMIN_API_KEY              — admin dashboard API key
  #   APP_URL                    — canonical URL e.g. https://rtc.praww.co.za
  #   FREESWITCH_DOMAIN          — FreeSWITCH host / WSS domain
  #   FREESWITCH_ESL_PASSWORD    — FreeSWITCH event socket password
  #   FREESWITCH_SSH_KEY         — SSH private key to push FS config
  #   FREESWITCH_SSH_USER        — SSH user on FS host  (optional, default ubuntu)
  #   FREESWITCH_SSH_PORT        — SSH port on FS host  (optional, default 22)
  #   FREESWITCH_EXT_IP          — public IPv4 for RTP ext-ip  (optional)
  #   FREESWITCH_CONF_DIR        — FS config dir  (optional)
  #   VAPID_PUBLIC_KEY           — web push VAPID public key
  #   VAPID_PRIVATE_KEY          — web push VAPID private key
  #   VAPID_SUBJECT              — mailto: or URL for VAPID subject  (optional)
  #   SENDGRID_API_KEY           — transactional email
  #   PAYFAST_MERCHANT_ID        — PayFast merchant ID
  #   PAYFAST_MERCHANT_KEY       — PayFast merchant key
  #   PAYFAST_PASSPHRASE         — PayFast passphrase  (optional)
  #   FIREBASE_SERVICE_ACCOUNT   — Firebase Admin SDK JSON (for FCM)
  #   TURN_HOST                  — TURN/STUN server host  (optional)
  #   TURN_SECRET                — TURN shared secret  (optional)
  #   TRUST_PROXY                — set to "1" if behind nginx  (optional)
  #   ALLOWED_ORIGINS            — comma-separated CORS origins  (optional)
  #
  # Optional:
  #   VPS_HEALTH_URL — https://rtc.praww.co.za/api/health  (optional; derived from APP_URL if absent)
  deploy:
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment secrets
        id: secrets_check
        run: |
          HOST="${{ secrets.VPS_HOST }}"
          KEY="${{ secrets.VPS_SSH_KEY }}"
          if [[ -z "$HOST" || -z "$KEY" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  VPS_HOST or VPS_SSH_KEY not set — skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✓ Deployment secrets found"
          fi

      - name: Write SSH key + deploy
        if: steps.secrets_check.outputs.configured == 'true'
        env:
          VPS_SSH_KEY_RAW: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
          # ── Application secrets — written to VPS .env on every deploy ──────
          SECRET_MONGODB_URI:             ${{ secrets.MONGODB_URI }}
          SECRET_SESSION_SECRET:          ${{ secrets.SESSION_SECRET }}
          SECRET_ADMIN_API_KEY:           ${{ secrets.ADMIN_API_KEY }}
          SECRET_APP_URL:                 ${{ secrets.APP_URL }}
          SECRET_FREESWITCH_DOMAIN:       ${{ secrets.FREESWITCH_DOMAIN }}
          SECRET_FREESWITCH_ESL_PASSWORD: ${{ secrets.FREESWITCH_ESL_PASSWORD }}
          SECRET_FREESWITCH_SSH_KEY:      ${{ secrets.FREESWITCH_SSH_KEY }}
          SECRET_FREESWITCH_SSH_USER:     ${{ secrets.FREESWITCH_SSH_USER }}
          SECRET_FREESWITCH_SSH_PORT:     ${{ secrets.FREESWITCH_SSH_PORT }}
          SECRET_FREESWITCH_EXT_IP:       ${{ secrets.FREESWITCH_EXT_IP }}
          SECRET_FREESWITCH_CONF_DIR:     ${{ secrets.FREESWITCH_CONF_DIR }}
          SECRET_VAPID_PUBLIC_KEY:        ${{ secrets.VAPID_PUBLIC_KEY }}
          SECRET_VAPID_PRIVATE_KEY:       ${{ secrets.VAPID_PRIVATE_KEY }}
          SECRET_VAPID_SUBJECT:           ${{ secrets.VAPID_SUBJECT }}
          SECRET_SENDGRID_API_KEY:        ${{ secrets.SENDGRID_API_KEY }}
          SECRET_PAYFAST_MERCHANT_ID:     ${{ secrets.PAYFAST_MERCHANT_ID }}
          SECRET_PAYFAST_MERCHANT_KEY:    ${{ secrets.PAYFAST_MERCHANT_KEY }}
          SECRET_PAYFAST_PASSPHRASE:      ${{ secrets.PAYFAST_PASSPHRASE }}
          SECRET_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SECRET_TURN_HOST:               ${{ secrets.TURN_HOST }}
          SECRET_TURN_SECRET:             ${{ secrets.TURN_SECRET }}
          SECRET_TRUST_PROXY:             ${{ secrets.TRUST_PROXY }}
          SECRET_ALLOWED_ORIGINS:         ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # ── Write VPS SSH private key robustly ───────────────────────────────
          # Python handles: literal \n escapes, CRLF, missing trailing newline,
          # extra blank lines, BOM, and other encoding artifacts.
          python3 - <<'PYEOF'
          import os, sys, re

          raw = os.environ.get('VPS_SSH_KEY_RAW', '')

          # If stored as single line with literal \n escapes (common mistake)
          if '\n' not in raw and '\\n' in raw:
              raw = raw.replace('\\n', '\n')

          # Strip Windows CRLF
          raw = raw.replace('\r\n', '\n').replace('\r', '\n')

          # Extract only the key block (handles extra surrounding whitespace/text)
          match = re.search(
              r'(-----BEGIN [A-Z ]+ PRIVATE KEY-----.*?-----END [A-Z ]+ PRIVATE KEY-----)',
              raw, re.DOTALL
          )
          if match:
              key = match.group(1).strip() + '\n'
          else:
              key = raw.strip() + '\n'

          key_path = os.path.expanduser('~/.ssh/deploy_key')
          with open(key_path, 'w') as f:
              f.write(key)

          print(f'Key written: {len(key)} bytes, {key.count(chr(10))} lines')
          print(f'First line: {key.splitlines()[0]}')
          print(f'Last line:  {key.splitlines()[-1]}')
          PYEOF

          chmod 600 ~/.ssh/deploy_key

          # ── Validate key can be parsed ────────────────────────────────────
          echo "── ssh-keygen fingerprint ────────────────────────────────"
          if ssh-keygen -l -f ~/.ssh/deploy_key 2>&1; then
            echo "✓ Key fingerprint OK"
          else
            echo "⚠️  ssh-keygen -l failed (key may have passphrase or unusual format)"
            echo "   File size: $(wc -c < ~/.ssh/deploy_key) bytes, $(wc -l < ~/.ssh/deploy_key) lines"
            echo "   First bytes (hex): $(head -c 64 ~/.ssh/deploy_key | xxd | head -4)"
          fi

          # ── Configure SSH client ──────────────────────────────────────────
          PORT="${VPS_PORT:-22}"
          HOST="$VPS_HOST"
          USER="${VPS_USER:-ubuntu}"

          # Scan the host key so we can verify it rather than skipping checks.
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          cat > ~/.ssh/config <<EOF
          Host deploy_target
            HostName $HOST
            User $USER
            Port $PORT
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            ServerAliveInterval 30
            ServerAliveCountMax 6
            ConnectTimeout 15
          EOF
          chmod 600 ~/.ssh/config

          # ── Test SSH connectivity ─────────────────────────────────────────
          echo "── Testing SSH to ${HOST}:${PORT} as ${USER} ──────────────"
          ssh -vvv deploy_target 'echo "✓ SSH OK — $(uname -n) — $(date)"' 2>&1 \
            | grep -E "^(debug1: |Warning|Authenticated|Permission|Connection|✓)" \
            | head -40 \
            || {
              echo "SSH FAILED — raw verbose output:"
              ssh -vvv deploy_target 'true' 2>&1 | tail -30
              exit 1
            }

          # ── Build env payload for VPS ─────────────────────────────────────
          # Collect every SECRET_* env var into a single string that the remote
          # Python script will use to update /home/ubuntu/PRawwPlus/.env.
          # Only keys with non-empty values are included.
          python3 - <<'ENVPYEOF'
          import os, json

          mapping = {
              'MONGODB_URI':             'SECRET_MONGODB_URI',
              'SESSION_SECRET':          'SECRET_SESSION_SECRET',
              'ADMIN_API_KEY':           'SECRET_ADMIN_API_KEY',
              'APP_URL':                 'SECRET_APP_URL',
              'FREESWITCH_DOMAIN':       'SECRET_FREESWITCH_DOMAIN',
              'FREESWITCH_ESL_PASSWORD': 'SECRET_FREESWITCH_ESL_PASSWORD',
              'FREESWITCH_SSH_KEY':      'SECRET_FREESWITCH_SSH_KEY',
              'FREESWITCH_SSH_USER':     'SECRET_FREESWITCH_SSH_USER',
              'FREESWITCH_SSH_PORT':     'SECRET_FREESWITCH_SSH_PORT',
              'FREESWITCH_EXT_IP':       'SECRET_FREESWITCH_EXT_IP',
              'FREESWITCH_CONF_DIR':     'SECRET_FREESWITCH_CONF_DIR',
              'VAPID_PUBLIC_KEY':        'SECRET_VAPID_PUBLIC_KEY',
              'VAPID_PRIVATE_KEY':       'SECRET_VAPID_PRIVATE_KEY',
              'VAPID_SUBJECT':           'SECRET_VAPID_SUBJECT',
              'SENDGRID_API_KEY':        'SECRET_SENDGRID_API_KEY',
              'PAYFAST_MERCHANT_ID':     'SECRET_PAYFAST_MERCHANT_ID',
              'PAYFAST_MERCHANT_KEY':    'SECRET_PAYFAST_MERCHANT_KEY',
              'PAYFAST_PASSPHRASE':      'SECRET_PAYFAST_PASSPHRASE',
              'FIREBASE_SERVICE_ACCOUNT':'SECRET_FIREBASE_SERVICE_ACCOUNT',
              'TURN_HOST':               'SECRET_TURN_HOST',
              'TURN_SECRET':             'SECRET_TURN_SECRET',
              'TRUST_PROXY':             'SECRET_TRUST_PROXY',
              'ALLOWED_ORIGINS':         'SECRET_ALLOWED_ORIGINS',
          }

          updates = {}
          for env_key, secret_env in mapping.items():
              val = os.environ.get(secret_env, '')
              if val:
                  updates[env_key] = val

          # Always ensure NODE_ENV=production is set
          updates['NODE_ENV'] = 'production'

          print(json.dumps(updates))
          ENVPYEOF

          ENV_JSON=$(python3 - <<'ENVPYEOF'
          import os, json

          mapping = {
              'MONGODB_URI':             'SECRET_MONGODB_URI',
              'SESSION_SECRET':          'SECRET_SESSION_SECRET',
              'ADMIN_API_KEY':           'SECRET_ADMIN_API_KEY',
              'APP_URL':                 'SECRET_APP_URL',
              'FREESWITCH_DOMAIN':       'SECRET_FREESWITCH_DOMAIN',
              'FREESWITCH_ESL_PASSWORD': 'SECRET_FREESWITCH_ESL_PASSWORD',
              'FREESWITCH_SSH_KEY':      'SECRET_FREESWITCH_SSH_KEY',
              'FREESWITCH_SSH_USER':     'SECRET_FREESWITCH_SSH_USER',
              'FREESWITCH_SSH_PORT':     'SECRET_FREESWITCH_SSH_PORT',
              'FREESWITCH_EXT_IP':       'SECRET_FREESWITCH_EXT_IP',
              'FREESWITCH_CONF_DIR':     'SECRET_FREESWITCH_CONF_DIR',
              'VAPID_PUBLIC_KEY':        'SECRET_VAPID_PUBLIC_KEY',
              'VAPID_PRIVATE_KEY':       'SECRET_VAPID_PRIVATE_KEY',
              'VAPID_SUBJECT':           'SECRET_VAPID_SUBJECT',
              'SENDGRID_API_KEY':        'SECRET_SENDGRID_API_KEY',
              'PAYFAST_MERCHANT_ID':     'SECRET_PAYFAST_MERCHANT_ID',
              'PAYFAST_MERCHANT_KEY':    'SECRET_PAYFAST_MERCHANT_KEY',
              'PAYFAST_PASSPHRASE':      'SECRET_PAYFAST_PASSPHRASE',
              'FIREBASE_SERVICE_ACCOUNT':'SECRET_FIREBASE_SERVICE_ACCOUNT',
              'TURN_HOST':               'SECRET_TURN_HOST',
              'TURN_SECRET':             'SECRET_TURN_SECRET',
              'TRUST_PROXY':             'SECRET_TRUST_PROXY',
              'ALLOWED_ORIGINS':         'SECRET_ALLOWED_ORIGINS',
          }

          updates = {}
          for env_key, secret_env in mapping.items():
              val = os.environ.get(secret_env, '')
              if val:
                  updates[env_key] = val

          updates['NODE_ENV'] = 'production'
          print(json.dumps(updates))
          ENVPYEOF
          )

          # ── Remote deployment script ──────────────────────────────────────────
          DEPLOY_DIR="${VPS_DEPLOY_DIR:-/home/ubuntu/PRawwPlus}"
          DEPLOY_DIR="${DEPLOY_DIR%/}"
          echo "── Deploying to $HOST:$DEPLOY_DIR ──────────────────────────"

          ssh deploy_target bash -s -- "$ENV_JSON" "$DEPLOY_DIR" <<'REMOTE'
          set -euo pipefail
          ENV_JSON="$1"
          DEPLOY_DIR="${2:-/home/ubuntu/PRawwPlus}"

          echo "==> [1/9] Pull latest code"
          git -C "$DEPLOY_DIR" fetch origin
          git -C "$DEPLOY_DIR" reset --hard "origin/$(git -C "$DEPLOY_DIR" rev-parse --abbrev-ref HEAD)"
          echo "  HEAD: $(git -C "$DEPLOY_DIR" log --oneline -1)"

          echo "==> [2/9] Fix file ownership"
          sudo chown -R ubuntu:ubuntu "$DEPLOY_DIR" 2>/dev/null || true

          echo "==> [3/9] Update .env from GitHub secrets"
          ENV_FILE="$DEPLOY_DIR/.env"
          # Create .env if it doesn't exist
          touch "$ENV_FILE"
          chmod 600 "$ENV_FILE"
          # Use Python to safely merge secrets into the existing .env
          python3 - "$ENV_FILE" "$ENV_JSON" <<'PYEOF'
          import sys, json, re, os

          env_path = sys.argv[1]
          updates  = json.loads(sys.argv[2])

          # Read existing .env
          try:
              with open(env_path, 'r') as f:
                  lines = f.readlines()
          except FileNotFoundError:
              lines = []

          # Build ordered list, preserving existing lines, updating matching keys
          updated_keys = set()
          new_lines = []
          for line in lines:
              stripped = line.rstrip('\n')
              # Match KEY=VALUE or KEY="VALUE" lines (skip comments / blanks)
              m = re.match(r'^([A-Za-z_][A-Za-z0-9_]*)\s*=', stripped)
              if m:
                  key = m.group(1)
                  if key in updates:
                      val = updates[key]
                      # Quote values that contain spaces, newlines, or special chars
                      # Use single-quote wrapping; escape embedded single quotes
                      safe = val.replace("'", "'\"'\"'")
                      new_lines.append(f"{key}='{safe}'\n")
                      updated_keys.add(key)
                      continue
              new_lines.append(line if line.endswith('\n') else line + '\n')

          # Append any keys not already present
          for key, val in updates.items():
              if key not in updated_keys:
                  safe = val.replace("'", "'\"'\"'")
                  new_lines.append(f"{key}='{safe}'\n")

          with open(env_path, 'w') as f:
              f.writelines(new_lines)

          added   = [k for k in updates if k not in {re.match(r'^([A-Za-z_][A-Za-z0-9_]*)\s*=', l.rstrip()).group(1) for l in lines if re.match(r'^([A-Za-z_][A-Za-z0-9_]*)\s*=', l.rstrip())}]
          print(f"  .env updated: {len(updates)} key(s) from GitHub secrets")
          PYEOF

          echo "==> [4/9] Enable pnpm"
          corepack enable 2>/dev/null || sudo npm install -g pnpm@10.26.1 --loglevel=error
          corepack prepare pnpm@10.26.1 --activate 2>/dev/null || true
          echo "  pnpm: $(pnpm --version)"

          echo "==> [5/9] Install dependencies"
          cd "$DEPLOY_DIR"
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

          echo "==> [6/9] Build shared libraries"
          pnpm --filter @workspace/db \
               --filter @workspace/api-zod \
               --filter @workspace/auth-web \
               --filter @workspace/api-client-react \
               run build

          echo "==> [7/9] Build web + API"
          pnpm --filter @workspace/prawwplus run build
          pnpm --filter @workspace/api-server run build

          echo "==> [8/9] Restart systemd service"
          sudo cp "$DEPLOY_DIR/deploy/prawwplus-api.service" /etc/systemd/system/prawwplus-api.service
          sudo systemctl daemon-reload
          sudo systemctl enable prawwplus-api
          sudo systemctl restart prawwplus-api
          echo "  Waiting for service to become active..."
          for i in $(seq 1 24); do
            sleep 5
            if systemctl is-active --quiet prawwplus-api; then
              echo "  ✓ Service active after $((i*5))s"
              break
            fi
            if [ "$i" -eq 24 ]; then
              echo "  ✗ Service failed after 120s"
              journalctl -u prawwplus-api -n 80 --no-pager
              exit 1
            fi
            echo "  ... $((i*5))s"
          done

          echo "==> [9/9] Cleanup stale processes"
          pgrep -f "tsx.*index" | grep -v "^$$" | xargs kill -SIGTERM 2>/dev/null || true
          for ZOMBIE_PPID in $(ps -eo ppid,stat | awk '$2~/^Z/{print $1}' | sort -u); do
            [ "$ZOMBIE_PPID" -le 1 ] && continue
            kill -SIGCHLD "$ZOMBIE_PPID" 2>/dev/null || true
          done

          echo "==> Deploy complete: $(date)"
          echo "    $(git -C "$DEPLOY_DIR" log --oneline -1)"
          systemctl status prawwplus-api --no-pager --lines=5
          REMOTE

      - name: HTTP health check
        id: health_check
        if: steps.secrets_check.outputs.configured == 'true'
        env:
          HEALTH_URL: ${{ secrets.VPS_HEALTH_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Derive the health endpoint — prefer explicit secret, then APP_URL, then VPS_HOST
          if [ -n "$HEALTH_URL" ]; then
            BASE_HEALTH="$HEALTH_URL"
          elif [ -n "$APP_URL" ]; then
            BASE_HEALTH="${APP_URL%/}/api/health"
          else
            BASE_HEALTH="http://${VPS_HOST}/api/health"
          fi
          echo "Checking $BASE_HEALTH"
          for i in 1 2 3 4 5 6; do
            BODY=$(curl -fsS --max-time 15 "$BASE_HEALTH" 2>/dev/null || echo "")
            STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 15 "$BASE_HEALTH" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $STATUS — body: ${BODY:0:120}"
            if [ "$STATUS" = "200" ] && echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('healthy') is True else 1)" 2>/dev/null; then
              echo "✓ Health check passed — healthy:true confirmed"
              exit 0
            fi
            [ "$i" -lt 6 ] && sleep 15
          done
          echo "✗ Health check failed after 6 attempts (expected HTTP 200 with {\"healthy\":true})"
          exit 1

      # ── Automatic rollback on health check failure ────────────────────────
      - name: Rollback on health check failure
        if: failure() && steps.health_check.conclusion == 'failure' && steps.secrets_check.outputs.configured == 'true'
        env:
          VPS_SSH_KEY_RAW: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR }}
        run: |
          set -euo pipefail
          echo "⚠️  Health check failed — initiating automatic rollback"

          # Reuse the key written in the deploy step (still present in $HOME/.ssh)
          if [ ! -f ~/.ssh/deploy_key ]; then
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            python3 - <<'PYEOF'
          import os, re
          raw = os.environ.get('VPS_SSH_KEY_RAW', '')
          if '\n' not in raw and '\\n' in raw:
              raw = raw.replace('\\n', '\n')
          raw = raw.replace('\r\n', '\n').replace('\r', '\n')
          match = re.search(r'(-----BEGIN [A-Z ]+ PRIVATE KEY-----.*?-----END [A-Z ]+ PRIVATE KEY-----)', raw, re.DOTALL)
          key = (match.group(1).strip() if match else raw.strip()) + '\n'
          with open(os.path.expanduser('~/.ssh/deploy_key'), 'w') as f:
              f.write(key)
          PYEOF
            chmod 600 ~/.ssh/deploy_key
            PORT="${VPS_PORT:-22}"
            ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
            cat > ~/.ssh/config <<EOF
          Host deploy_target
            HostName $VPS_HOST
            User ${VPS_USER:-ubuntu}
            Port $PORT
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
            ServerAliveInterval 30
            ServerAliveCountMax 6
            ConnectTimeout 15
          EOF
            chmod 600 ~/.ssh/config
          fi

          DEPLOY_DIR="${VPS_DEPLOY_DIR:-/home/ubuntu/PRawwPlus}"
          DEPLOY_DIR="${DEPLOY_DIR%/}"

          ssh deploy_target bash -s -- "$DEPLOY_DIR" <<'ROLLBACK'
          set -euo pipefail
          DEPLOY_DIR="${1:-/home/ubuntu/PRawwPlus}"
          echo "==> [Rollback 1/4] Identify previous commit"
          PREV=$(git -C "$DEPLOY_DIR" rev-parse HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            echo "  ✗ Cannot determine previous commit — rollback aborted"
            exit 1
          fi
          echo "  Previous HEAD: $PREV"
          echo "  Current HEAD:  $(git -C "$DEPLOY_DIR" rev-parse HEAD)"

          echo "==> [Rollback 2/4] Reset to previous commit"
          git -C "$DEPLOY_DIR" reset --hard "$PREV"
          echo "  Now at: $(git -C "$DEPLOY_DIR" log --oneline -1)"

          echo "==> [Rollback 3/4] Rebuild API server from previous code"
          cd "$DEPLOY_DIR"
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          pnpm --filter @workspace/db --filter @workspace/api-zod --filter @workspace/auth-web --filter @workspace/api-client-react run build
          pnpm --filter @workspace/api-server run build

          echo "==> [Rollback 4/4] Restart service with previous build"
          sudo systemctl restart prawwplus-api
          for i in $(seq 1 12); do
            sleep 5
            if systemctl is-active --quiet prawwplus-api; then
              echo "  ✓ Rollback complete — service active after $((i*5))s"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "  ✗ Service failed to start even after rollback — MANUAL INTERVENTION REQUIRED"
              journalctl -u prawwplus-api -n 60 --no-pager
              exit 1
            fi
          done
          echo "  Rollback to $PREV completed at $(date)"
          systemctl status prawwplus-api --no-pager --lines=5
          ROLLBACK
          echo "✓ Rollback SSH completed — check VPS logs for final status"
