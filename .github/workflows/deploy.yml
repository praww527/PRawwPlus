name: CI / Deploy

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Verify (runs on every push + PR) ────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: API server — typecheck
        run: pnpm --filter @workspace/api-server run typecheck

      - name: API server — build
        run: pnpm --filter @workspace/api-server run build

      - name: Mobile — typecheck
        run: pnpm --filter @workspace/prawwplus-mobile run typecheck

  # ─── 2. Deploy to Oracle VPS (main/master branch only) ──────────────────────
  #
  # Required GitHub Secrets:
  #   VPS_HOST        — public IP or hostname of the Oracle VPS
  #   VPS_USER        — SSH user  (e.g. "ubuntu" or "opc")
  #   VPS_SSH_KEY     — full PEM private key (starts with -----BEGIN ...)
  #   VPS_PORT        — SSH port  (default 22)
  #   VPS_DEPLOY_DIR  — absolute path where the repo lives on the server
  #                     (e.g. /home/ubuntu/PRawwPlus)
  #   VPS_HEALTH_URL  — full URL to hit as a health check after deploy
  #                     (e.g. https://rtc.praww.co.za/api/healthz)
  deploy:
    needs: verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_DIR }}

            echo "==> Pulling latest code"
            git pull origin $(git rev-parse --abbrev-ref HEAD)

            echo "==> Enabling corepack / pnpm"
            corepack enable
            corepack prepare pnpm@10.26.1 --activate

            echo "==> Installing dependencies"
            # --frozen-lockfile may fail on ARM64 hosts (optional native deps);
            # fall back to a regular install so the deploy never stalls on lockfile drift.
            pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

            echo "==> Building libraries"
            pnpm --filter @workspace/db \
                 --filter @workspace/api-zod \
                 --filter @workspace/auth-web \
                 --filter @workspace/api-client-react \
                 run build

            echo "==> Building web app"
            pnpm --filter @workspace/prawwplus run build

            echo "==> Building API server"
            pnpm --filter @workspace/api-server run build

            echo "==> Restarting API server"
            sudo systemctl restart prawwplus-api

            echo "==> Waiting for service to become healthy"
            for i in $(seq 1 12); do
              sleep 5
              if systemctl is-active --quiet prawwplus-api; then
                echo "  Service is active (attempt $i)"
                break
              fi
              echo "  Waiting... ($i/12)"
            done

            if ! systemctl is-active --quiet prawwplus-api; then
              echo "ERROR: prawwplus-api failed to start"
              journalctl -u prawwplus-api -n 40 --no-pager
              exit 1
            fi

            echo "==> Deploy complete — $(date)"

      # Optional HTTP health-check — skipped if VPS_HEALTH_URL secret is not set
      - name: HTTP health check
        if: ${{ secrets.VPS_HEALTH_URL != '' }}
        run: |
          echo "Checking ${{ secrets.VPS_HEALTH_URL }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "${{ secrets.VPS_HEALTH_URL }}" || echo "000")
            echo "  Attempt $i → HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
