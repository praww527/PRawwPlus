kind = "web"
previewPath = "/"
title = "Call Manager"
version = "1.0.0"

[[services]]
localPort = 3000
name = "web"
paths = ["/"]

[services.env]
PORT = "3000"
BASE_PATH = "/"

[services.development]
run = "pnpm --filter @workspace/call-manager run dev"

[services.production]
build = "pnpm --filter @workspace/call-manager run build"
