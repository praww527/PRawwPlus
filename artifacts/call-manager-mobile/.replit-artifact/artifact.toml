kind = "mobile"
previewPath = "/mobile/"
title = "Call Manager Mobile"
version = "1.0.0"
id = "artifacts/call-manager-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19344

[services.development]
run = "pnpm --filter @workspace/call-manager-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/call-manager-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/call-manager-mobile", "run", "serve" ]

[services.env]
PORT = "19344"
BASE_PATH = "/mobile/"
