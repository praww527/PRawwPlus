<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />

    <title>PRaww+</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (light + dark) -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0a0a0a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0a0a0a" />

    <!-- Android / Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="PRaww+" />

    <!-- iOS PWA (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PRaww+" />

    <!-- iOS touch icons (multiple sizes for different devices) -->
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <!-- iOS Splash screen colors -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Windows tile -->
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="msapplication-config" content="none" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Business VoIP & unified communications for South Africa" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
