packages:
  "framer-motion": "Animations, page transitions, and micro-interactions"
  "recharts": "Data visualization for the admin dashboard"
  "date-fns": "Formatting dates for call and payment history"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod resolver for form validation"
  "clsx": "Class merging utility for Tailwind"
  "tailwind-merge": "Resolving Tailwind class conflicts"

images:
  - path: "artifacts/prawwplus/public/images/bg-abstract.png"
    description: "Dark professional abstract background with subtle deep indigo, neon teal, and black mesh gradients, highly blurred and modern"
    aspect_ratio: "16:9"
  - path: "artifacts/prawwplus/public/images/avatar-placeholder.png"
    description: "Minimalist abstract geometric user avatar placeholder in shades of deep blue and purple on a transparent background"
    aspect_ratio: "1:1"

notes:
  - "Authentication uses the custom @workspace/auth-web hook (fetches /api/auth/user)."
  - "React Query hooks are imported from @workspace/api-client-react."
  - "PayFast forms automatically submit via a generated hidden form when the endpoint returns PayFastPaymentData."
