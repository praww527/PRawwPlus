# Nginx reverse-proxy config for PRawwPlus on Oracle VPS
# Place at: /etc/nginx/sites-available/prawwplus
# Enable:   sudo ln -sf /etc/nginx/sites-available/prawwplus /etc/nginx/sites-enabled/prawwplus
# SSL:      sudo certbot --nginx -d YOUR_DOMAIN

upstream prawwplus_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Required for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- SSL (managed by Certbot / Let's Encrypt) ---
    # Certbot will update these paths automatically
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # --- Upload size (for profile images etc.) ---
    client_max_body_size 10M;

    # --- Static web app (Vite production build) ---
    root /home/ubuntu/PRawwPlus/artifacts/prawwplus/dist/public;
    index index.html;

    # Serve static assets with long-term cache
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for all non-API, non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API + WebSocket proxy (/api/*) ---
    location /api/ {
        proxy_pass         http://prawwplus_api;
        proxy_http_version 1.1;

        # WebSocket support (Verto WS proxy + SIP WS proxy)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client IP and protocol — required for TRUST_PROXY to work
        # (cookie security, PayFast IP verification)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket and long-poll connections alive
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time event streams
        proxy_buffering off;
    }

    # --- Health check (no access logs) ---
    location = /api/healthz {
        proxy_pass http://prawwplus_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
}
