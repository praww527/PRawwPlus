# Nginx reverse-proxy config for PRawwPlus on Oracle VPS
# Place at: /etc/nginx/sites-available/prawwplus
# Enable:   sudo ln -s /etc/nginx/sites-available/prawwplus /etc/nginx/sites-enabled/
# SSL:      sudo certbot --nginx -d your-domain.com
#
# Replace YOUR_DOMAIN with your actual domain or Oracle VPS public IP.

upstream prawwplus_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- SSL (managed by Certbot / Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # --- Static web app (prawwplus Vite build) ---
    root /home/ubuntu/PRawwPlus/artifacts/prawwplus/dist/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API + WebSocket proxy (/api/*) ---
    location /api/ {
        proxy_pass         http://prawwplus_api;
        proxy_http_version 1.1;

        # WebSocket support (Verto WS proxy + SIP WS proxy)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;   # keep WS connections alive
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # --- Health check (no logs) ---
    location = /api/healthz {
        proxy_pass http://prawwplus_api;
        access_log off;
    }
}
