# Nginx reverse-proxy — PRawwPlus on Oracle VPS (Ubuntu AMD64)
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/prawwplus
#   sudo sed -i "s/YOUR_DOMAIN/your-real-domain.com/g" /etc/nginx/sites-available/prawwplus
#   sudo ln -sf /etc/nginx/sites-available/prawwplus /etc/nginx/sites-enabled/prawwplus
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after the above):
#   sudo certbot --nginx -d your-real-domain.com

upstream prawwplus {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # Static web app (Vite build)
    root /home/ubuntu/PRawwPlus/artifacts/call-manager/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + WebSocket proxy
    location /api/ {
        proxy_pass         http://prawwplus;
        proxy_http_version 1.1;

        # WebSocket (Verto + SIP WS proxies)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    # Health check — suppress access logs
    location = /api/healthz {
        proxy_pass http://prawwplus;
        access_log off;
    }
}
