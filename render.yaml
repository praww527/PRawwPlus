services:
  - type: web
    name: praww
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/call-manager run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_PASSPHRASE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: FREESWITCH_DOMAIN
        sync: false
      - key: FREESWITCH_WS_URL
        sync: false
      - key: FREESWITCH_INTERNAL_WS_URL
        sync: false
      - key: FREESWITCH_SSH_KEY
        sync: false
      - key: FREESWITCH_ESL_PORT
        sync: false
      - key: FREESWITCH_ESL_PASSWORD
        sync: false
      - key: FREESWITCH_SSH_USER
        sync: false
